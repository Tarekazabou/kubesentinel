version: '3.9'

services:
  # Go CLI + monitoring service
  kubesentinel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kubesentinel
    command: monitor --config /app/config/config.yaml
    volumes:
      # Mount config directory
      - ./config:/app/config:ro
      # Mount forensics (persistent)
      - ./forensics:/app/forensics
      # Mount reports (persistent)
      - ./reports:/app/reports
      # Mount Falco socket (from host, if available)
      - /run/falco:/run/falco:ro
    environment:
      - LOG_LEVEL=info
    depends_on:
      ai-service:
        condition: service_healthy
    networks:
      - kubesentinel-net

  # Python AI/ML service
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile.ai
    container_name: ai-service
    ports:
      - "5000:5000"
    volumes:
      # Mount models directory
      - ./ai-module/models:/app/models
      # Mount forensics (confirmed incidents are written here)
      - ./forensics:/app/forensics
    environment:
      - FLASK_ENV=production
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - STAGING_DB_PATH=/app/staging.db
      - TRIAGE_POLL_INTERVAL=30
      - TRIAGE_BATCH_SIZE=10
    networks:
      - kubesentinel-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  kubesentinel-net:
    driver: bridge