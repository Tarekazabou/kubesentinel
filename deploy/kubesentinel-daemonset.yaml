---
# Namespace (must be created first)
apiVersion: v1
kind: Namespace
metadata:
  name: kubesentinel
  labels:
    app: kubesentinel

---
# PersistentVolume for KubeSentinel data (Minikube hostPath)
# For production clusters, replace with your storage backend (e.g., NFS, EBS, local storage)
apiVersion: v1
kind: PersistentVolume
metadata:
  name: kubesentinel-data-pv
  labels:
    app: kubesentinel
spec:
  capacity:
    storage: 5Gi
  volumeMode: Filesystem
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /mnt/data/kubesentinel
    type: DirectoryOrCreate
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: Exists

---
# PersistentVolumeClaim for KubeSentinel data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kubesentinel-data-pvc
  namespace: kubesentinel
  labels:
    app: kubesentinel
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  selector:
    matchLabels:
      app: kubesentinel

---
# ServiceAccount for KubeSentinel
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kubesentinel
  namespace: kubesentinel
  labels:
    app: kubesentinel
    version: v1

---
# ClusterRole for KubeSentinel RBAC
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kubesentinel
  labels:
    app: kubesentinel
    version: v1
rules:
  # Read pods for context and metadata enrichment
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  
  # Read pod logs for forensics
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  
  # Read events for anomaly context
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch"]
  
  # Read namespaces for multi-tenancy support
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  
  # Read nodes for system info
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]
  
  # Read deployments for configuration context
  - apiGroups: ["apps"]
    resources: ["deployments", "daemonsets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  
  # Read network policies for security insights
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  
  # Read RBAC for security posture assessment
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
    verbs: ["get", "list", "watch"]
  
  # Read pod security policies if present
  - apiGroups: ["policy"]
    resources: ["podsecuritypolicies"]
    verbs: ["get", "list", "watch"]

---
# ClusterRoleBinding for KubeSentinel
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kubesentinel
  labels:
    app: kubesentinel
    version: v1
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kubesentinel
subjects:
  - kind: ServiceAccount
    name: kubesentinel
    namespace: kubesentinel

---
# ConfigMap for KubeSentinel configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: kubesentinel-config
  namespace: kubesentinel
  labels:
    app: kubesentinel
    version: v1
data:
  config.yaml: |
    static:
      rules_path: "/etc/kubesentinel/rules"
      severity_threshold: "medium"
      output_format: "json"

    runtime:
      falco_socket: "unix:///run/falco/falco.sock"
      buffer_size: 10000
      workers: 4
      namespace: ""  # Monitor all namespaces
      deployment: "" # Monitor all deployments

    ai:
      endpoint: "http://kubesentinel-ai:5000"
      model_path: "/data/models/baseline.pkl"
      threshold: 0.75
      health_check_interval: "30s"

    forensics:
      storage_path: "/data/forensics"
      retention_days: 90
      max_size_mb: 1000
      compression: true

    gemini:
      enabled: false  # Set to true if GEMINI_API_KEY is available
      api_key: ""
      model: "gemini-2.5-flash"
      classify_runtime: true
      timeout_seconds: 15

    reporting:
      formats: ["markdown", "html", "json"]
      output_path: "/data/reports"
  
  build-in-rules.yaml: |
    - id: BUILT-IN-001
      name: Disallow Privileged Containers
      description: Running containers in privileged mode grants excessive permissions, increasing attack surface.
      severity: critical
      kind: [Pod, Deployment, StatefulSet, DaemonSet]
      checks:
        - path: spec.containers[*].securityContext.privileged
          operator: equals
          value: true
      remediation: Set securityContext.privileged to false. Use specific capabilities instead of full privilege.

    - id: BUILT-IN-002
      name: Require runAsNonRoot
      description: Containers should not run as root to minimize privilege escalation risks.
      severity: high
      kind: [Pod, Deployment, StatefulSet, DaemonSet]
      checks:
        - path: spec.containers[*].securityContext.runAsNonRoot
          operator: notEquals
          value: true
      remediation: Set securityContext.runAsNonRoot to true and specify a non-zero runAsUser.

    - id: BUILT-IN-003
      name: Disallow Latest Image Tag
      description: Using ':latest' can lead to unexpected image versions and reproducibility issues.
      severity: medium
      kind: [Pod, Deployment, StatefulSet, DaemonSet]
      checks:
        - path: spec.containers[*].image
          operator: contains
          value: ":latest"
      remediation: Specify explicit image tags or digests (e.g., nginx:1.25.3 or nginx@sha256:...).

    - id: BUILT-IN-004
      name: Restrict Dangerous Capabilities
      description: Certain capabilities like SYS_ADMIN or NET_RAW can allow container escapes or network attacks.
      severity: critical
      kind: [Pod, Deployment, StatefulSet, DaemonSet]
      checks:
        - path: spec.containers[*].securityContext.capabilities.add
          operator: contains
          value: "SYS_ADMIN"
        - path: spec.containers[*].securityContext.capabilities.add
          operator: contains
          value: "NET_RAW"
      remediation: Remove dangerous capabilities from securityContext.capabilities.add. Drop all by default and add only necessary ones.

    - id: BUILT-IN-005
      name: Require Resource Limits
      description: Missing CPU/memory limits can lead to resource exhaustion and DoS attacks.
      severity: high
      kind: [Pod, Deployment, StatefulSet, DaemonSet]
      checks:
        - path: spec.containers[*].resources.limits
          operator: notExists
          value: null
      remediation: "Define resources.limits for CPU and memory in each container (e.g., cpu: 500m, memory: 512Mi)."
  
  custom-rules.yaml: |
    - id: CUSTOM-001
      name: Detect Exposed SSH Ports
      description: Container exposes SSH port 22 which creates an attack surface
      severity: high
      kind: [Pod, Deployment]
      checks:
        - path: spec.containers.ports.containerPort
          operator: equals
          value: 22
      remediation: Remove SSH port exposure. Use kubectl exec or alternative secure access methods

    - id: CUSTOM-002
      name: Disallow Latest Image Tag
      description: Using 'latest' tag can lead to unpredictable deployments
      severity: medium
      kind: [Pod, Deployment]
      checks:
        - path: spec.containers.image
          operator: contains
          value: ":latest"
      remediation: Use specific image tags (e.g., nginx:1.21.6) for reproducible deployments

    - id: CUSTOM-003
      name: Require Network Policies
      description: Deployments should have associated network policies for traffic control
      severity: medium
      kind: [Deployment]
      checks:
        - path: metadata.labels.network-policy
          operator: notExists
          value: null
      remediation: "Create a NetworkPolicy resource and label deployment with 'network-policy: enforced'"

    - id: CUSTOM-004
      name: Detect Dangerous Capabilities
      description: Container has dangerous Linux capabilities enabled
      severity: critical
      kind: [Pod, Deployment]
      checks:
        - path: spec.containers.securityContext.capabilities.add
          operator: contains
          value: "SYS_ADMIN"
      remediation: Remove SYS_ADMIN and other dangerous capabilities. Use minimal capability sets

    - id: CUSTOM-005
      name: Require Pod Security Standards
      description: Namespace should enforce pod security standards
      severity: high
      kind: [Namespace]
      checks:
        - path: metadata.labels.pod-security.kubernetes.io/enforce
          operator: notExists
          value: null
      remediation: "Add label to namespace with 'pod-security.kubernetes.io/enforce: restricted' to enforce Pod Security Standards"

---
# DaemonSet for KubeSentinel Runtime Monitoring
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: kubesentinel
  namespace: kubesentinel
  labels:
    app: kubesentinel
    version: v1
spec:
  selector:
    matchLabels:
      app: kubesentinel
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app: kubesentinel
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: kubesentinel
      hostNetwork: false
      hostPID: false
      hostIPC: false
      
      # Init container to create the named pipe for Falco output
      initContainers:
        - name: create-falco-pipe
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - mkfifo /run/falco/falco.pipe || true
          volumeMounts:
            - name: falco-socket
              mountPath: /run/falco
      
      # Tolerate all taints including master/control-plane nodes
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
        - effect: NoExecute
          key: node.kubernetes.io/not-ready
          tolerationSeconds: 0
        - effect: NoExecute
          key: node.kubernetes.io/unreachable
          tolerationSeconds: 0
      
      # Node selector for Linux nodes only
      nodeSelector:
        kubernetes.io/os: linux
      
      # Run on all node types
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/os
                    operator: In
                    values:
                      - linux

      containers:
        - name: kubesentinel
          image: kubesentinel:latest
          imagePullPolicy: IfNotPresent
          
          command:
            - /app/kubesentinel
          args:
            - monitor
            - --config=/etc/kubesentinel/config.yaml
          
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: kubesentinel-secrets
                  key: gemini-api-key
                  optional: true
            - name: TRAINING_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kubesentinel-secrets
                  key: training-api-token
                  optional: true
          
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534    # nobody — least-privilege for a monitoring agent
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
          
          # Mount Falco socket from host
          volumeMounts:
            - name: falco-socket
              mountPath: /run/falco
            - name: config
              mountPath: /etc/kubesentinel/config.yaml
              subPath: config.yaml
              readOnly: true
            - name: rules
              mountPath: /etc/kubesentinel/rules
              readOnly: true
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
            - name: run
              mountPath: /run/kubesentinel

          # Liveness probe — check the metrics/health HTTP endpoint
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe — only mark ready once the health endpoint responds
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 2

      volumes:
        # Mount Falco socket from the host
        - name: falco-socket
          hostPath:
            path: /run/falco
            type: DirectoryOrCreate
        
        # ConfigMap — only config.yaml
        - name: config
          configMap:
            name: kubesentinel-config
            defaultMode: 0444
            items:
              - key: config.yaml
                path: config.yaml
        
        # Rules directory — mount rule files from ConfigMap
        - name: rules
          configMap:
            name: kubesentinel-config
            defaultMode: 0444
            items:
              - key: build-in-rules.yaml
                path: build-in-rules.yaml
              - key: custom-rules.yaml
                path: custom-rules.yaml
        
        # Persistent data volume for forensics and reports (survives pod restarts)
        - name: data
          persistentVolumeClaim:
            claimName: kubesentinel-data-pvc
        
        # Temporary files
        - name: tmp
          emptyDir: {}
        
        # Runtime socket directory
        - name: run
          emptyDir: {}

---
apiVersion: v1
kind: Secret
metadata:
  name: kubesentinel-ai-secrets
  namespace: kubesentinel
type: Opaque
stringData:
  GEMINI_API_KEY: ""
  ENRICH_WITH_GEMINI: "true"
  TRAINING_API_TOKEN: "9c542c438bcb773d0ef69dab1b13186e"
  GEMINI_RATE_LIMIT_PER_MINUTE: "25"

---
# Deployment for the AI/ML module
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubesentinel-ai
  namespace: kubesentinel
  labels:
    app: kubesentinel-ai
    version: v1
spec:
  replicas: 1 # TriageWorker is a singleton daemon thread — scaling to >1 causes SQLite race condition and duplicate forensic writes.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: kubesentinel-ai
  template:
    metadata:
      labels:
        app: kubesentinel-ai
        version: v1
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: kubesentinel
      
      initContainers:
        - name: fix-ai-volume-permissions
          image: busybox:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - chown -R 65534:65534 /app/forensics /app/staging.db || true
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
          volumeMounts:
            - name: forensics
              mountPath: /app/forensics
              subPath: forensics
            - name: staging-db
              mountPath: /app/staging.db
              subPath: staging.db
      
      containers:
        - name: ai-service
          image: kubesentinel-ai:latest
          imagePullPolicy: IfNotPresent
          
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
          
          envFrom:
            - secretRef:
                name: kubesentinel-ai-secrets
          env:
            - name: STAGING_DB_PATH
              value: "/app/staging.db"
            - name: TRIAGE_POLL_INTERVAL
              value: "30"
            - name: TRIAGE_BATCH_SIZE
              value: "10"
          
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
          
          securityContext:
            runAsNonRoot: true
            runAsUser: 65534
            runAsGroup: 65534
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # gunicorn writes temp files
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              drop:
                - ALL
          
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /health
              port: http
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
          
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: forensics
              mountPath: /app/forensics
              subPath: forensics
            - name: staging-db
              mountPath: /app/staging.db
              subPath: staging.db
      
      volumes:
        - name: models
          emptyDir:
            sizeLimit: 500Mi
        - name: forensics
          hostPath:
            path: /var/lib/kubesentinel/forensics
            type: DirectoryOrCreate
        - name: staging-db
          hostPath:
            path: /var/lib/kubesentinel/staging.db
            type: FileOrCreate

---
# Service for the AI module
apiVersion: v1
kind: Service
metadata:
  name: kubesentinel-ai
  namespace: kubesentinel
  labels:
    app: kubesentinel-ai
    version: v1
spec:
  # ClusterIP keeps the AI service internal-only.
  # Expose externally via an Ingress or kubectl port-forward during development.
  type: ClusterIP
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      protocol: TCP
  selector:
    app: kubesentinel-ai

---
# Service for Prometheus metrics from KubeSentinel DaemonSet
apiVersion: v1
kind: Service
metadata:
  name: kubesentinel-metrics
  namespace: kubesentinel
  labels:
    app: kubesentinel
    component: metrics
    version: v1
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"
spec:
  type: ClusterIP
  ports:
    - name: metrics
      port: 8080
      targetPort: 8080
      protocol: TCP
  selector:
    app: kubesentinel

---
# Service for Falcosidekick runtime event ingestion
apiVersion: v1
kind: Service
metadata:
  name: kubesentinel-runtime
  namespace: kubesentinel
  labels:
    app: kubesentinel
spec:
  type: ClusterIP
  selector:
    app: kubesentinel
  ports:
    - name: http
      port: 8080
      targetPort: 8080
