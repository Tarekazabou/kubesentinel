---
# KubeSentinel Secrets (template)
# Create this secret before deploying the DaemonSet:
# 
# kubectl create secret generic kubesentinel-secrets \
#   --from-literal=gemini-api-key='YOUR_GEMINI_API_KEY_HERE' \
#   -n kubesentinel
#
# Or use this manifest as a template:

apiVersion: v1
kind: Secret
metadata:
  name: kubesentinel-secrets
  namespace: kubesentinel
  labels:
    app: kubesentinel
    version: v1
type: Opaque
stringData:
  # Gemini API Key for LLM-powered analysis
  # Get from: https://makersuite.google.com/app/apikey
  # Set to empty string to disable Gemini features
  gemini-api-key: ""
