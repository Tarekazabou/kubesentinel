# Falco Helm Chart Values for KubeSentinel
# This configuration installs Falco on all cluster nodes to provide runtime security events
# for KubeSentinel monitoring.

# DaemonSet configuration — runs Falco on every node
daemonset:
  enabled: true
  
  # Tolerate all taints to ensure Falco runs on control-plane and worker nodes
  tolerations:
    - effect: NoSchedule
      operator: Exists
    - effect: NoExecute
      operator: Exists

  # Run on all Linux nodes
  nodeSelector:
    kubernetes.io/os: linux

  # Service account and RBAC
  serviceAccount:
    create: true
    name: falco
  
  # Pod security context — Falco needs root and host access
  podSecurityContext:
    runAsUser: 0
    fsGroup: 0
  
  # Container security context
  securityContext:
    privileged: true
    allowPrivilegeEscalation: true
    readOnlyRootFilesystem: false
    runAsUser: 0
    runAsNonRoot: false
    capabilities:
      add:
        - SYS_PTRACE
        - SYS_ADMIN
        - NET_ADMIN
      drop:
        - ALL

  # Resource requests and limits
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Falco configuration
falco:
  # Enable JSON output for easier parsing
  json_output: true
  
  # Set log level to WARNING to avoid verbose startup messages in the file_output
  log_level: warning
  
  # gRPC disabled; KubeSentinel monitor-stdin consumes Falco stdout JSON
  grpc:
    enabled: false
    listen_port: 5060
    threadiness: 0
  
  grpc_output:
    enabled: false
  
  # File output — write to named pipe for KubeSentinel (JSON ONLY)
  file_output:
    enabled: true
    filename: /run/falco/falco.pipe
    keep_alive: true
  
  # Disable stdout output to prevent mixed logs
  stdout_output:
    enabled: false
  
  # Buffering options
  outputs:
    rate: 0
    max_burst: 1000

# Image configuration
image:
  repository: falcosecurity/falco
  tag: 0.37.1
  pullPolicy: IfNotPresent

# Container socket — mounted by KubeSentinel
driver:
  kind: modern_ebpf
