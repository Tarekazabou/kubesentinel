apiVersion: v1
kind: Pod
metadata:
  name: insecure-test-pod
  namespace: kubesentinel-test
  labels:
    app: kubesentinel-test
spec:
  containers:
  - name: vulnerable
    image: ubuntu:22.04
    command: ["/bin/sleep", "3600"]
    securityContext:
      privileged: true                    # Triggers privileged container rule
      runAsUser: 0                        # Runs as root
      capabilities:
        add: ["SYS_ADMIN", "NET_RAW"]     # Dangerous capabilities
    volumeMounts:
    - name: host-root
      mountPath: /host
  volumes:
  - name: host-root
    hostPath:
      path: /
