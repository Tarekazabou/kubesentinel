- id: BUILT-IN-001
  name: Disallow Privileged Containers
  description: Running containers in privileged mode grants excessive permissions, increasing attack surface.
  severity: critical
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].securityContext.privileged
      operator: equals
      value: true
  remediation: Set securityContext.privileged to false. Use specific capabilities instead of full privilege.

- id: BUILT-IN-002
  name: Require runAsNonRoot
  description: Containers should not run as root to minimize privilege escalation risks.
  severity: high
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].securityContext.runAsNonRoot
      operator: notEquals
      value: true
  remediation: Set securityContext.runAsNonRoot to true and specify a non-zero runAsUser.

- id: BUILT-IN-003
  name: Disallow Latest Image Tag
  description: Using ':latest' can lead to unexpected image versions and reproducibility issues.
  severity: medium
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].image
      operator: contains
      value: ":latest"
  remediation: Specify explicit image tags or digests (e.g., nginx:1.25.3 or nginx@sha256:...).

- id: BUILT-IN-004
  name: Restrict Dangerous Capabilities
  description: Certain capabilities like SYS_ADMIN or NET_RAW can allow container escapes or network attacks.
  severity: critical
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].securityContext.capabilities.add
      operator: contains
      value: "SYS_ADMIN"
    - path: spec.containers[*].securityContext.capabilities.add
      operator: contains
      value: "NET_RAW"
    - path: spec.containers[*].securityContext.capabilities.add
      operator: contains
      value: "SYS_PTRACE"
    - path: spec.containers[*].securityContext.capabilities.add
      operator: contains
      value: "DAC_READ_SEARCH"
  remediation: Remove dangerous capabilities from securityContext.capabilities.add. Drop all by default and add only necessary ones.

- id: BUILT-IN-005
  name: Require Resource Limits
  description: Missing CPU/memory limits can lead to resource exhaustion and DoS attacks.
  severity: high
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].resources.limits
      operator: notExists
      value: null
  remediation: Define resources.limits for CPU and memory in each container (e.g., cpu: 500m, memory: 512Mi).

# ==================== NEW PRODUCTION RULES (6-17) ====================

- id: BUILT-IN-006
  name: Disallow Host Network
  description: Pods using hostNetwork share the host's network namespace and can bypass network policies.
  severity: critical
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.hostNetwork
      operator: equals
      value: true
  remediation: Set spec.hostNetwork: false.

- id: BUILT-IN-007
  name: Disallow Host PID
  description: Sharing the host process namespace allows containers to inspect and kill host processes.
  severity: critical
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.hostPID
      operator: equals
      value: true
  remediation: Set spec.hostPID: false.

- id: BUILT-IN-008
  name: Disallow Host IPC
  description: Sharing the host IPC namespace enables inter-process communication attacks across containers.
  severity: critical
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.hostIPC
      operator: equals
      value: true
  remediation: Set spec.hostIPC: false.

- id: BUILT-IN-009
  name: Disallow Privilege Escalation
  description: Containers must not be allowed to escalate privileges (setuid/setgid).
  severity: high
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].securityContext.allowPrivilegeEscalation
      operator: equals
      value: true
  remediation: Set allowPrivilegeEscalation: false in container securityContext.

- id: BUILT-IN-010
  name: Require Read-Only Root Filesystem
  description: Containers should run with a read-only root filesystem to prevent runtime modifications.
  severity: high
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].securityContext.readOnlyRootFilesystem
      operator: notEquals
      value: true
  remediation: Set readOnlyRootFilesystem: true.

- id: BUILT-IN-011
  name: Drop All Capabilities
  description: All Linux capabilities should be dropped by default and only the minimum required added.
  severity: critical
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].securityContext.capabilities.drop
      operator: notExists
      value: null
  remediation: Add capabilities.drop: ["ALL"] and only add required capabilities (e.g., NET_BIND_SERVICE).

- id: BUILT-IN-012
  name: Require Resource Requests
  description: Resource requests are mandatory for proper scheduling and to prevent resource starvation.
  severity: medium
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].resources.requests
      operator: notExists
      value: null
  remediation: Define both CPU and memory requests in resources.requests.

- id: BUILT-IN-013
  name: Disallow HostPath Volumes
  description: Mounting host directories (hostPath) gives containers direct access to the host filesystem.
  severity: critical
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.volumes[*].hostPath
      operator: exists
      value: null
  remediation: Replace hostPath volumes with emptyDir, configMap, or secret.

- id: BUILT-IN-014
  name: Require Image Pull Policy Always
  description: imagePullPolicy: Always ensures the latest image is pulled and avoids stale cached images.
  severity: medium
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].imagePullPolicy
      operator: notEquals
      value: Always
  remediation: Set imagePullPolicy: Always.

- id: BUILT-IN-015
  name: Disallow Automount Service Account Token
  description: Automatic mounting of the default service account token increases the attack surface.
  severity: high
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.automountServiceAccountToken
      operator: equals
      value: true
  remediation: Set automountServiceAccountToken: false (or use a dedicated ServiceAccount with minimal RBAC).

- id: BUILT-IN-016
  name: Restrict RunAsUser (non-root)
  description: Running containers as UID 0 (root) is prohibited.
  severity: high
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].securityContext.runAsUser
      operator: equals
      value: 0
  remediation: Use runAsNonRoot: true or set runAsUser to a value > 0.

- id: BUILT-IN-017
  name: Require Container Security Context
  description: Every container must define a securityContext.
  severity: low
  kind: [Pod, Deployment, StatefulSet, DaemonSet]
  checks:
    - path: spec.containers[*].securityContext
      operator: notExists
      value: null
  remediation: Add a securityContext block to every container.
- id: BUILT-IN-018
  name: Disallow Root User (runAsUser: 0)
  description: Explicitly running as root (UID 0) is strictly prohibited.
  severity: critical
  kind: [Pod, Deployment, StatefulSet, DaemonSet, CronJob]
  checks:
    - path: spec.containers[*].securityContext.runAsUser
      operator: equals
      value: 0
  remediation: Use runAsNonRoot: true or runAsUser > 1000.

- id: BUILT-IN-019
  name: Require Specific ServiceAccount
  description: Pods should not use the default ServiceAccount.
  severity: high
  kind: [Pod, Deployment...]
  checks:
    - path: spec.serviceAccountName
      operator: equals
      value: default

- id: BUILT-IN-020
  name: Disallow HostPath with Sensitive Paths
  description: Mounting /, /etc, /root, /var/run/docker.sock etc. is extremely dangerous.
  severity: critical
  kind: [Pod...]
  checks:
    - path: spec.volumes[*].hostPath.path
      operator: contains
      value: "/"

- id: BUILT-IN-021
  name: Require Seccomp Profile RuntimeDefault
  description: Should use seccomp profile to restrict syscalls.
  severity: high
  kind: [Pod...]
  checks:
    - path: spec.securityContext.seccompProfile.type
      operator: notEquals
      value: RuntimeDefault

- id: BUILT-IN-022
  name: Disallow EmptyDir Medium Memory
  description: Using memory-backed emptyDir without limits can cause node DoS.
  severity: medium
  kind: [Pod...]
  checks:
    - path: spec.volumes[*].emptyDir.medium
      operator: equals
      value: Memory
